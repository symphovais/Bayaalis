{{/*
  Author Section Partial
  Usage: {{ partial "homepage/author-section.html" . }}
  Displays author information with social links
*/}}

<section class="author-section">
  <div class="container">
    <div class="author-section__container">
      <!-- Author Photo (optional - using logo as fallback) -->
      <img src="/Symphonytek_logo.png"
           alt="Ovais Akhter"
           class="author-section__photo">

      <!-- Author Info -->
      <div class="author-section__info">
        <h2 class="author-section__name">Ovais Akhter</h2>
        <p class="author-section__title">Product Leader • 24 years in tech</p>
        <p class="author-section__bio">
          Insights on Generative AI, Privacy, Product Management, and Technology Leadership.
        </p>

        <!-- Social Links -->
        <div class="author-section__social">
          <a href="https://twitter.com/ovaisakhter"
             target="_blank"
             rel="noopener noreferrer"
             class="author-section__social-link"
             aria-label="Follow on Twitter/X">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4l11.733 16h4.267l-11.733 -16z"></path>
              <path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path>
            </svg>
          </a>
          <a href="https://www.linkedin.com/in/ovaisakhter/"
             target="_blank"
             rel="noopener noreferrer"
             class="author-section__social-link"
             aria-label="Connect on LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
              <path d="M8 11l0 5"></path>
              <path d="M8 8l0 .01"></path>
              <path d="M12 16l0 -5"></path>
              <path d="M16 16v-3a2 2 0 0 0 -4 0"></path>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
